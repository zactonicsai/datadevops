worker_processes auto;
events { worker_connections 1024; }

http {
  # Docker's embedded DNS resolver lets us load-balance the scaled
  # message-api replicas by their service name.
  resolver 127.0.0.11 valid=10s ipv6=off;

  # Upstreams resolved dynamically so `deploy.replicas: 3` are all used.
  map $host $dummy { default ""; }

  log_format main '$remote_addr - [$time_local] "$request" $status '
                  'upstream=$upstream_addr rt=$request_time';
  access_log /dev/stdout main;

  client_max_body_size 100M;   # allow binary file uploads

  server {
    listen 80;

    # ---- Dashboard (default) ----
    location / {
      set $dash dashboard:8003;
      proxy_pass http://$dash;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      # The dashboard proxies what-if calls to analytics -> Ollama, whose first
      # inference (cold model load on CPU) can take well over nginx's 60s
      # default. Give it room so it isn't cut off with a 504.
      proxy_read_timeout 180s;
      proxy_send_timeout 180s;
    }

    # ---- Message API (scaled x3, round-robin by Docker DNS) ----
    location /api/ {
      set $api message-api:8001;
      proxy_pass http://$api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ---- Analytics service ----
    location /analytics/ {
      set $an analytics:8002;
      rewrite ^/analytics/(.*) /$1 break;
      proxy_pass http://$an;
      proxy_set_header Host $host;
      proxy_read_timeout 180s;   # what-if LLM calls can be slow (cold model)
    }

    # ---- Apache NiFi ----
    # NiFi now terminates TLS itself (HTTPS, single-user auth) and is published
    # directly on host port 8443. It is NOT proxied through this LB — access it
    # at https://localhost:8443/nifi (self-signed cert warning is expected).
    # The dashboard links straight there.

    location /healthz { return 200 "ok\n"; }
  }
}
