worker_processes auto;
events { worker_connections 1024; }

http {
  # Docker's embedded DNS resolver lets us load-balance the scaled
  # message-api replicas by their service name.
  resolver 127.0.0.11 valid=10s ipv6=off;

  # Upstreams resolved dynamically so `deploy.replicas: 3` are all used.
  map $host $dummy { default ""; }

  log_format main '$remote_addr - [$time_local] "$request" $status '
                  'upstream=$upstream_addr rt=$request_time';
  access_log /dev/stdout main;

  client_max_body_size 100M;   # allow binary file uploads

  server {
    listen 80;

    # ---- Dashboard (default) ----
    location / {
      set $dash dashboard:8003;
      proxy_pass http://$dash;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      # The dashboard proxies what-if calls to analytics -> Ollama, whose first
      # inference (cold model load on CPU) can take well over nginx's 60s
      # default. Give it room so it isn't cut off with a 504.
      proxy_read_timeout 180s;
      proxy_send_timeout 180s;
    }

    # ---- Message API (scaled x3, round-robin by Docker DNS) ----
    location /api/ {
      set $api message-api:8001;
      proxy_pass http://$api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ---- Analytics service ----
    location /analytics/ {
      set $an analytics:8002;
      rewrite ^/analytics/(.*) /$1 break;
      proxy_pass http://$an;
      proxy_set_header Host $host;
      proxy_read_timeout 180s;   # what-if LLM calls can be slow (cold model)
    }

    # ---- Apache NiFi UI ----
    # NiFi serves its UI at the /nifi/ base path. We proxy /nifi/ straight
    # through to that same base (no path rewrite) and forward the NiFi-specific
    # X-Proxy* headers it uses to build asset/redirect URLs. Without these the
    # page loads but its CSS/JS resolve to the wrong path (blank screen).
    # Trailing slashes on BOTH location and proxy_pass are required.
    location /nifi/ {
      proxy_pass http://nifi:8080/nifi/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-ProxyScheme $scheme;
      proxy_set_header X-ProxyHost $host;
      proxy_set_header X-ProxyPort 8080;
      proxy_set_header X-ProxyContextPath /;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_read_timeout 120s;
    }
    # NiFi REST API + docs live at sibling paths; proxy them too.
    location /nifi-api/ {
      proxy_pass http://nifi:8080/nifi-api/;
      proxy_set_header Host $host;
      proxy_set_header X-ProxyScheme $scheme;
      proxy_set_header X-ProxyHost $host;
      proxy_set_header X-ProxyPort 8080;
      proxy_set_header X-ProxyContextPath /;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_read_timeout 120s;
    }
    # Bare /nifi (no slash) -> redirect to the slashed form so links work.
    location = /nifi { return 302 /nifi/; }

    location /healthz { return 200 "ok\n"; }
  }
}
