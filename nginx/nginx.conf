worker_processes auto;
events { worker_connections 1024; }

http {
  # Docker's embedded DNS resolver lets us load-balance the scaled
  # message-api replicas by their service name.
  resolver 127.0.0.11 valid=10s ipv6=off;

  # Upstreams resolved dynamically so `deploy.replicas: 3` are all used.
  map $host $dummy { default ""; }

  log_format main '$remote_addr - [$time_local] "$request" $status '
                  'upstream=$upstream_addr rt=$request_time';
  access_log /dev/stdout main;

  client_max_body_size 100M;   # allow binary file uploads

  server {
    listen 80;

    # ---- Dashboard (default) ----
    location / {
      set $dash dashboard:8003;
      proxy_pass http://$dash;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # ---- Message API (scaled x3, round-robin by Docker DNS) ----
    location /api/ {
      set $api message-api:8001;
      proxy_pass http://$api;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ---- Analytics service ----
    location /analytics/ {
      set $an analytics:8002;
      rewrite ^/analytics/(.*) /$1 break;
      proxy_pass http://$an;
      proxy_set_header Host $host;
      proxy_read_timeout 120s;   # what-if LLM calls can be slow
    }

    # ---- Apache NiFi UI (served under /nifi/) ----
    # NiFi is picky behind a proxy: it validates the Host/X-Forwarded-*
    # headers against nifi.web.proxy.host, and its UI uses WebSockets.
    location /nifi {
      set $nifi nifi:8080;
      proxy_pass http://$nifi;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Port 8080;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_read_timeout 120s;
    }

    location /healthz { return 200 "ok\n"; }
  }
}
