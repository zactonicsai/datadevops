apiVersion: apps/v1
kind: Deployment
metadata:
  name: load-generator
  namespace: test-tools
spec:
  replicas: 10
  selector:
    matchLabels:
      app: load-generator
  template:
    metadata:
      labels:
        app: load-generator
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: busybox
          image: busybox:1.37.0
          command:
            - /bin/sh
            - -c
            - >-
              while true; do
                wget -q -O- http://hello-web.web.svc.cluster.local >/dev/null;
              done
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 32Mi
